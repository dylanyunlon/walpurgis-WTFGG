---
# ═══════════════════════════════════════════════════════════════
# Walpurgis Configuration — METR-LA (traffic speed, 207 sensors)
#
# Tier placement notes:
#   - batch_size 64 × 207 nodes × 32 hidden = ~1.6 MB per batch
#   - Dynamic graph: O(207^2) = ~170 KB per adjacency snapshot
#   - Uses StandardScaler normalization (speed data, not flow)
#   - 80 epochs default — faster convergence than PEMS datasets
#   - doubletransition adj: 2 matrices → tier migration cost × 2
#
# Debug knobs:
#   walpurgis.debug_interval: print full state every N steps
#   walpurgis.profile: enable per-layer timing breakdown
#   walpurgis.nan_guard: check tensors for NaN/Inf after each layer
# ═══════════════════════════════════════════════════════════════

start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cuda:0
  load_pkl: False

walpurgis:
  debug_interval: 100
  profile: False
  tier_sim: False
  nan_guard: True
  log_grad_norms: True
  tier_placement_log: True
  checkpoint_struct_dump: True

data_args:
  data_dir: datasets/METR-LA
  adj_data_path: datasets/sensor_graph/adj_mx.pkl
  adj_type: doubletransition

model_args:
  batch_size: 64
  num_feat: 2
  num_hidden: 32
  node_hidden: 10
  time_emb_dim: 10
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

optim_args:
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-5
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 50]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 3
  output_seq_len: 12
  warm_epochs: 0
  epochs: 80
  patience: 20
  seq_length: 12
