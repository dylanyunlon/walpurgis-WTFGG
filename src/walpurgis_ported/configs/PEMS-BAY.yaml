---
# ═══════════════════════════════════════════════════════════════
# Walpurgis v3 Configuration — PEMS-BAY (traffic speed, 325 sensors)
#
# v3 deltas: tikhonov regularization, JSD drift, blocked shuffle,
#            EMA epoch logging, Welford scaler with sentinel
#
# Tier placement notes:
#   - batch_size 64 × 325 nodes × 32 hidden = ~2.5 MB per batch
#   - Largest sensor count → highest memory pressure
#   - Uses StandardScaler normalization (speed data)
#
# Memory budget estimate (fp32, single GPU):
#   model params:           ~2.1M × 4B = ~8.4 MB
#   activation per layer:   ~2.5 MB × 4 layers = ~10 MB
#   graph adjacency cache:  ~420 KB × 2 (doubletransition) = ~840 KB
#   optimizer state (Adam): ~8.4 MB × 2 = ~16.8 MB
#   total working set:      ~36 MB (fits comfortably in HBM)
# ═══════════════════════════════════════════════════════════════

start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cuda:0
  load_pkl: False

walpurgis:
  debug_interval: 100
  profile: False
  tier_sim: False
  nan_guard: True
  log_grad_norms: True
  tier_placement_log: True
  checkpoint_struct_dump: True
  mem_budget_mb: 36.0
  # v3 additions
  tikhonov_eps: 1.0e-6
  block_shuffle_factor: 4
  jsd_alert_threshold: 0.1
  ema_alpha: 0.1
  integrity_scan: True
  scaler_bound_sigma: 8
  spectral_snapshot_k: 6

data_args:
  data_dir: datasets/PEMS-BAY
  adj_data_path: datasets/sensor_graph/adj_mx_bay.pkl
  adj_type: doubletransition

model_args:
  batch_size: 64
  num_feat: 2
  num_hidden: 32
  node_hidden: 10
  time_emb_dim: 10
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

optim_args:
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-5
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 50]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 3
  output_seq_len: 12
  warm_epochs: 0
  epochs: 100
  patience: 20
  seq_length: 12
