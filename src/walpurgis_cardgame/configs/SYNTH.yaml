---
# CardGame D2STGNN — SYNTH dataset配置
# 算法改写: RAdam + OneCycleLR + mixup + cosine temperature CL

# start up
start_up:
  mode: scratch      # three mode: test, resume, scratch
  resume_epoch: 0

  model_name:   D2STGNN
  device:       cpu
  load_pkl:     False

# Data Processing
data_args:
  data_dir:       datasets/SYNTH
  adj_data_path:  datasets/sensor_graph/adj_mx_synth.pkl
  adj_type:       doubletransition

# Model Args
model_args:
  batch_size:   16
  num_feat:     1
  num_hidden:   16
  node_hidden:  8
  time_emb_dim: 8
  dropout:      0.1
  seq_length:   12
  k_t:          3
  k_s:          2
  gap:          3
  num_modalities: 2
  # CardGame特有
  spatial_dropout: 0.05
  attention_heads: 2

# Optimization Args — CardGame: RAdam + OneCycleLR
optim_args:
  lrate:          0.002
  print_model:    False
  wdecay:         1.0e-5
  eps:            1.0e-8
  # RAdam特有
  optimizer:      radam
  # OneCycleLR参数
  lr_schedule:    True
  lr_sche_steps:  [1, 5, 8]
  lr_decay_ratio: 0.5
  max_lr:         0.005
  pct_start:      0.3
  # 课程学习 — cosine temperature
  if_cl:          True
  cl_epochs:      2
  cl_temperature_start: 1.0
  cl_temperature_end:   0.1
  output_seq_len: 12
  warm_epochs:    0
  epochs:         3
  patience:       100
  seq_length:     12
  # Mixup增强
  mixup_alpha:    0.2
  mixup_enabled:  True
  # 梯度norm追踪
  grad_clip:      5.0
  grad_norm_track: True
