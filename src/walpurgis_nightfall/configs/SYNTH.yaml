---
# start up
start_up:
  mode: scratch      # three mode: test, resume, scratch
  resume_epoch: 0

  model_name:   D2STGNN
  device:       cpu
  load_pkl:     False

# Data Processing
data_args:
  data_dir:       datasets/SYNTH
  adj_data_path:  datasets/sensor_graph/adj_mx_synth.pkl
  adj_type:       doubletransition

# Model Args
model_args:
  batch_size:   16
  num_feat:     1
  num_hidden:   16
  node_hidden:  8
  time_emb_dim: 8
  dropout:      0.1
  seq_length:   12
  k_t:          3
  k_s:          2
  gap:          3
  num_modalities: 2

# Optimization Args
optim_args:
  lrate:          0.002
  print_model:    False
  wdecay:         1.0e-5
  eps:            1.0e-8
  lr_schedule:    True
  lr_sche_steps:  [1, 5, 8]
  lr_decay_ratio: 0.5
  if_cl:          True
  cl_epochs:      2
  output_seq_len: 12
  warm_epochs:    0
  epochs:         3
  patience:       100
  seq_length:     12
