start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cuda:0
  load_pkl: false
data_args:
  data_dir: datasets/PEMS-BAY
  adj_data_path: datasets/sensor_graph/adj_mx_bay.pkl
  adj_type: doubletransition
model_args:
  batch_size: 32
  num_feat: 1
  num_hidden: 32
  node_hidden: 12
  time_emb_dim: 12
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2
optim_args:
  lrate: 0.002
  print_model: false
  wdecay: 1.0e-05
  eps: 1.0e-08
  lr_schedule: true
  lr_sche_steps:
  - 1
  - 28
  - 36
  - 44
  - 52
  - 60
  - 68
  - 78
  lr_decay_ratio: 0.5
  if_cl: true
  cl_epochs: 3
  output_seq_len: 12
  warm_epochs: 30
  epochs: 80
  patience: 120
  seq_length: 12
debug_args:
  probe_depth: 64
  dump_on_nan: true
  phase_budget_sec: 300
  print_grad_norm: true
  snapshot_every_n: 5
  plateau_cooldown: 8
