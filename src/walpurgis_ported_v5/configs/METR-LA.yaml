---
# ── Walpurgis v5 Config: METR-LA ──────────────────────────────────
# Deltas vs upstream:
#   • added debug_args section (probe_depth, dump_on_nan, phase_budget)
#   • lr_sche_steps uses cosine-warm-restart anchor points
#   • patience raised to 120 with plateau_cooldown
#   • gap renamed → stride (internal alias kept for compat)

start_up:
  mode: scratch
  resume_epoch: 0
  model_name:   D2STGNN
  device:       cuda:0
  load_pkl:     False

data_args:
  data_dir:       datasets/METR-LA
  adj_data_path:  datasets/sensor_graph/adj_mx_la.pkl
  adj_type:       doubletransition

model_args:
  batch_size:   32
  num_feat:     1
  num_hidden:   32
  node_hidden:  10
  time_emb_dim: 10
  dropout:      0.1
  seq_length:   12
  k_t:          3
  k_s:          2
  gap:          3
  num_modalities: 2

optim_args:
  lrate:          0.002
  print_model:    False
  wdecay:         1.0e-5
  eps:            1.0e-8
  lr_schedule:    True
  lr_sche_steps:  [1, 28, 36, 44, 52, 60, 70, 80]
  lr_decay_ratio: 0.5
  if_cl:          True
  cl_epochs:      6
  output_seq_len: 12
  warm_epochs:    0
  epochs:         80
  patience:       120
  seq_length:     12

# ── v5 addition: runtime diagnostics ──
debug_args:
  probe_depth:        64          # TensorProbe ring-buffer size
  dump_on_nan:        True        # auto-dump state when NaN detected
  phase_budget_sec:   300         # per-phase wall-clock soft limit
  print_grad_norm:    True        # print ‖∇‖ after each backward
  snapshot_every_n:   5           # epoch interval for full state snapshot
  plateau_cooldown:   8           # epochs to wait after LR drop before ES counts
