---
# ═══════════════════════════════════════════════════════════════
# Walpurgis Configuration — METR-LA (traffic speed, 207 sensors)
#
# Tier placement notes:
#   - batch_size 32 × 207 nodes × 32 hidden = ~800 KB per layer
#   - Dynamic graph: O(207^2) = ~170 KB per adjacency
#   - Recommendation: all model tensors fit in HBM for single-GPU
# ═══════════════════════════════════════════════════════════════

# start up
start_up:
  mode: scratch          # three modes: test, resume, scratch
  resume_epoch: 0        # only used in 'resume' mode
  model_name: D2STGNN
  device: cuda:0
  load_pkl: False

# ── Walpurgis debug settings ──
walpurgis:
  debug_interval: 100    # print debug info every N steps
  profile: False         # enable per-component profiling
  tier_sim: False        # enable tier placement simulation
  nan_guard: True        # check for NaN/Inf after each component

# Data Processing
data_args:
  data_dir: datasets/METR-LA
  adj_data_path: datasets/sensor_graph/adj_mx_la.pkl
  adj_type: doubletransition

# Model Args
model_args:
  batch_size: 32
  num_feat: 1
  num_hidden: 32
  node_hidden: 10
  time_emb_dim: 10
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

# Optimization Args
optim_args:
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-5
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 30, 38, 46, 54, 62, 70, 80]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 6
  output_seq_len: 12
  warm_epochs: 0
  epochs: 80
  patience: 100
  seq_length: 12
