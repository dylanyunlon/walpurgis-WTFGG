---
start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cpu
  load_pkl: False
data_args:
  data_dir: datasets/METR-LA
  adj_data_path: datasets/sensor_graph/adj_mx_la.pkl
  adj_type: doubletransition
model_args:
  batch_size: 64
  num_feat: 1
  num_hidden: 112
  node_hidden: 48
  time_emb_dim: 48
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2
optim_args:
  lrate: 0.001
  print_model: False
  wdecay: 1.0e-4
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 50, 80, 120, 160]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 6
  output_seq_len: 12
  warm_epochs: 8
  epochs: 200
  patience: 50
  seq_length: 12
adj_preprocess:
  rbf_kernel: True
  rbf_sigma: auto
  knn_k: 15
  symmetric_closure: True
training:
  amp_enabled: False
  ensemble_test: True
  adaptive_clip_percentile: 90
  cl_ramp_mode: sigmoid
