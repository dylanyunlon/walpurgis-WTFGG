---
# ═══════════════════════════════════════════════════════════════
# Walpurgis Configuration — PEMS08 (traffic flow, 170 sensors)
#
# Tier placement notes:
#   - batch_size 32 × 170 nodes × 32 hidden = ~0.7 MB per layer
#   - Dynamic graph: O(170^2) = ~115 KB per adjacency
#   - Smallest sensor graph → lowest memory pressure
#   - Good candidate for single-tier (HBM-only) baseline comparison
#   - Uses MinMax normalization (flow data)
#   - 300 epochs with patience 100 — full convergence run
#
# PEMS08 is the "canary" dataset: smallest, fastest to iterate.
# Use this config to validate pipeline changes before PEMS04/BAY.
#
# Tier migration is less impactful here (everything fits in HBM),
# but the debug infrastructure still exercises the same code paths.
# ═══════════════════════════════════════════════════════════════

start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cuda:0
  load_pkl: False

walpurgis:
  debug_interval: 200
  profile: False
  tier_sim: False
  nan_guard: True
  log_grad_norms: True
  tier_placement_log: True
  checkpoint_struct_dump: True
  mem_budget_mb: 16.0
  canary_mode: True

data_args:
  data_dir: datasets/PEMS08
  adj_data_path: datasets/sensor_graph/adj_mx_08.pkl
  adj_type: doubletransition

model_args:
  batch_size: 32
  num_feat: 1
  num_hidden: 32
  node_hidden: 12
  time_emb_dim: 12
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

optim_args:
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-5
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 30, 38, 46, 54, 200]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 3
  output_seq_len: 12
  warm_epochs: 30
  epochs: 300
  patience: 100
  seq_length: 12
