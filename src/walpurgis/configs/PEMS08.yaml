---
# ═══════════════════════════════════════════════════════════════
# Walpurgis v3 Configuration — PEMS08 (traffic flow, 170 sensors)
#
# v3 deltas: tikhonov regularization, JSD drift, blocked shuffle,
#            EMA epoch logging, canary mode for pipeline validation
#
# Tier placement notes:
#   - batch_size 32 × 170 nodes × 32 hidden = ~0.7 MB per layer
#   - Smallest sensor graph → lowest memory pressure
#   - Good candidate for single-tier (HBM-only) baseline
#   - Uses MinMax normalization (flow data)
#
# PEMS08 is the "canary" dataset: smallest, fastest to iterate.
# Use this config to validate v3 pipeline changes before PEMS04/BAY.
# ═══════════════════════════════════════════════════════════════

start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN
  device: cuda:0
  load_pkl: False

walpurgis:
  debug_interval: 200
  profile: False
  tier_sim: False
  nan_guard: True
  log_grad_norms: True
  tier_placement_log: True
  checkpoint_struct_dump: True
  mem_budget_mb: 16.0
  canary_mode: True
  # v3 additions
  tikhonov_eps: 1.0e-6
  block_shuffle_factor: 4
  jsd_alert_threshold: 0.1
  ema_alpha: 0.1
  integrity_scan: True
  scaler_bound_sigma: 8
  spectral_snapshot_k: 6

data_args:
  data_dir: datasets/PEMS08
  adj_data_path: datasets/sensor_graph/adj_mx_08.pkl
  adj_type: doubletransition

model_args:
  batch_size: 32
  num_feat: 1
  num_hidden: 32
  node_hidden: 12
  time_emb_dim: 12
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

optim_args:
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-5
  eps: 1.0e-8
  lr_schedule: True
  lr_sche_steps: [1, 30, 38, 46, 54, 200]
  lr_decay_ratio: 0.5
  if_cl: True
  cl_epochs: 3
  output_seq_len: 12
  warm_epochs: 30
  epochs: 300
  patience: 100
  seq_length: 12
