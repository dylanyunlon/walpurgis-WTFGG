start_up:
  model_name: D2STGNN
  device: cpu
  mode: scratch
  load_pkl: false
  resume_epoch: 0

data_args:
  data_dir: datasets/SYNTH
  adj_data_path: datasets/SYNTH/adj_mx.pkl
  adj_type: doubletransition

model_args:
  batch_size: 16
  num_feat: 1
  num_hidden: 32
  node_hidden: 8
  time_emb_dim: 8
  seq_length: 12
  gap: 3
  k_s: 2
  k_t: 3
  dropout: 0.12
  print_model: false

optim_args:
  epochs: 50
  patience: 15
  lrate: 0.0018
  wdecay: 1.2e-4
  eps: 1.0e-8
  lr_schedule: true
  lr_sche_steps: [20, 35, 45]
  lr_decay_ratio: 0.35
  if_cl: true
  cl_epochs: 3
  warm_epochs: 1
  output_seq_len: 12
  print_model: false
