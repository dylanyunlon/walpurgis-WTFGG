---
# Aphelion (远日点) — SYNTH configuration
start_up:
  mode: scratch
  resume_epoch: 0
  model_name: D2STGNN_APHELION
  device: cpu
  load_pkl: False

data_args:
  data_dir: datasets/SYNTH
  adj_data_path: datasets/sensor_graph/adj_mx_synth.pkl
  adj_type: original

model_args:
  batch_size: 16
  num_feat: 1
  num_hidden: 32
  node_hidden: 10
  time_emb_dim: 10
  dropout: 0.1
  seq_length: 12
  k_t: 3
  k_s: 2
  gap: 3
  num_modalities: 2

optim_args:
  # Sophia optimizer (Aphelion改写: 替代Adam/RAdam)
  lrate: 0.002
  print_model: False
  wdecay: 1.0e-4
  eps: 1.0e-15
  sophia_rho: 0.04
  sophia_betas: [0.965, 0.99]
  # ExponentialLR scheduler (Aphelion改写: 替代MultiStepLR/Cosine)
  lr_schedule: True
  lr_sche_steps: [1, 30, 38, 46, 54, 62, 70, 80]
  lr_decay_ratio: 0.5
  exp_decay_gamma: 0.97
  # curriculum learning
  if_cl: True
  cl_epochs: 6
  output_seq_len: 12
  # warm up
  warm_epochs: 0
  # TERM loss params (Aphelion改写)
  tilt_init: 1.0
  hessian_interval: 10
  # procedure
  epochs: 80
  patience: 100
  seq_length: 12
